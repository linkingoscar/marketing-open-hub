<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarTech Open Hub — 启动器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0A0A0F; color: #F1F5F9; font-family: system-ui, sans-serif;
    }
    .card {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; padding: 48px; max-width: 480px; text-align: center;
      backdrop-filter: blur(20px);
    }
    h1 { font-size: 28px; margin-bottom: 8px; }
    h1 span {
      background: linear-gradient(135deg, #818CF8, #06B6D4);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { color: #94A3B8; margin-bottom: 32px; line-height: 1.6; }
    .btn {
      display: inline-block; padding: 14px 32px; border-radius: 12px;
      background: linear-gradient(135deg, #6366F1, #06B6D4); color: #fff;
      text-decoration: none; font-weight: 600; font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(99,102,241,0.3); }
    .status { margin-top: 24px; font-size: 13px; color: #64748B; }
    .status .ok { color: #10B981; }
    .status .err { color: #EF4444; }
    .links { margin-top: 24px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .links a {
      padding: 8px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08);
      color: #94A3B8; text-decoration: none; font-size: 13px; transition: all 0.2s;
    }
    .links a:hover { border-color: #6366F1; color: #F1F5F9; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span>MarTech Open Hub</span></h1>
    <p>市场营销 × 消费者行为研究<br>开源项目发现与工具平台</p>
    <a class="btn" href="http://localhost:8080" target="_blank">打开平台 →</a>
    <div class="links">
      <a href="http://localhost:8080/workspace" target="_blank">工作台</a>
      <a href="http://localhost:8080/settings" target="_blank">API 设置</a>
      <a href="http://localhost:8080/compare" target="_blank">项目对比</a>
    </div>
    <div class="status" id="status">检测服务状态...</div>
  </div>
  <script>
    fetch("http://localhost:8080", { mode: "no-cors" })
      .then(() => { document.getElementById("status").innerHTML = '<span class="ok">●</span> 开发服务器运行中 — http://localhost:8080'; })
      .catch(() => { document.getElementById("status").innerHTML = '<span class="err">●</span> 服务未启动。请运行 <code style="background:rgba(255,255,255,0.06);padding:2px 8px;border-radius:4px">pnpm dev</code>'; });
  </script>
</body>
</html>
